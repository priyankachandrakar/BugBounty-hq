<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BugBounty HQ — Unified Bug Bounty Toolkit</title>
  <meta name="description" content="Unified command center for 300+ bug bounty and penetration testing tools. Search, filter, generate commands, and run pre-built attack workflows.">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">
</head>
<body>

<!-- Particle background -->
<canvas id="particles-canvas"></canvas>

<!-- Toast -->
<div class="toast" id="toast">✓ Copied!</div>

<!-- Command Center Modal -->
<div class="modal-overlay" id="cc-overlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal" style="width:800px;">
    <div class="modal-header">
      <div class="tool-icon cat-recon" style="width:36px;height:36px;border-radius:10px;font-size:16px;">⚡</div>
      <div class="modal-title">Command Center</div>
      <button class="modal-close" onclick="document.getElementById('cc-overlay').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body" id="cc-body">Loading...</div>
  </div>
</div>

<!-- Tool Detail Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="tool-icon cat-recon" style="width:36px;height:36px;border-radius:10px;font-size:16px;">🛠️</div>
      <div class="modal-title" id="modal-tool-name">Tool Details</div>
      <button class="modal-close" onclick="app.closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body">Loading...</div>
  </div>
</div>

<!-- App Layout -->
<div class="app-layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-badge">
        <div class="logo-icon">🛡️</div>
        <div class="logo-text">
          <span class="name">BugBounty HQ</span>
          <span class="sub">v1.0 · 300+ Tools</span>
        </div>
      </div>
    </div>

    <div class="sidebar-stats">
      <div class="stat-pill">
        <div class="num" id="sb-total">—</div>
        <div class="lbl">Tools</div>
      </div>
      <div class="stat-pill">
        <div class="num">7</div>
        <div class="lbl">Workflows</div>
      </div>
      <div class="stat-pill">
        <div class="num">8</div>
        <div class="lbl">Utilities</div>
      </div>
    </div>

    <div class="sidebar-search">
      <div class="search-wrap">
        <span class="icon">🔍</span>
        <input type="text" id="sidebar-search" placeholder="Filter categories...">
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- Built by JS -->
    </nav>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-content">

    <!-- Top Bar -->
    <header class="topbar">
      <button class="mobile-toggle" id="mobile-toggle">☰</button>
      <div class="topbar-title">
        <span id="topbar-title">🏠 Dashboard</span>
      </div>
      <div class="topbar-actions">
        <div class="search-global">
          <span class="search-icon">🔍</span>
          <input type="text" id="global-search" placeholder="Search 300+ tools... (Ctrl+K)">
        </div>
        <button class="btn btn-ghost" onclick="app.openCommandCenter()">⚡ Command Center</button>
        <button class="btn btn-ghost" onclick="window.open('https://github.com/vavkamil/awesome-bugbounty-tools','_blank')">↗ GitHub</button>
      </div>
    </header>

    <!-- ===== DASHBOARD ===== -->
    <section class="page-section active" id="section-dashboard">
      <div style="color:var(--text-muted);text-align:center;padding:60px;">Loading dashboard...</div>
    </section>

    <!-- ===== ALL TOOLS ===== -->
    <section class="page-section" id="section-tools">
      <div style="color:var(--text-muted);text-align:center;padding:60px;">Loading tools...</div>
    </section>

    <!-- ===== WORKFLOWS ===== -->
    <section class="page-section" id="section-workflows">
      <div style="color:var(--text-muted);text-align:center;padding:60px;">Loading workflows...</div>
    </section>

    <!-- ===== UTILITIES ===== -->
    <section class="page-section" id="section-utilities">
      <div style="color:var(--text-muted);text-align:center;padding:60px;">Loading utilities...</div>
    </section>

    <!-- ===== PAYLOADS ===== -->
    <section class="page-section" id="section-payloads">
      <div style="color:var(--text-muted);text-align:center;padding:60px;">Loading payloads...</div>
    </section>

  </main>
</div>

<!-- Scripts (order matters) -->
<script src="js/tools-data.js"></script>
<script src="js/app.js"></script>

<script>
  // Keyboard shortcut: Ctrl+K to focus search
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      document.getElementById('global-search')?.focus();
    }
  });

  // Update sidebar total count
  document.addEventListener('DOMContentLoaded', () => {
    const el = document.getElementById('sb-total');
    if (el && typeof STATS !== 'undefined') el.textContent = STATS.total + '+';
  });
</script>

</body>
</html>
